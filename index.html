<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indique um Amigo - Aroma de Lavanda</title>
    <style>
        :root { --primary-color: #6a1b9a; --bg-color: #f5f5f7; }
        body { font-family: sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: #fff; width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); box-sizing: border-box; }
        h2 { color: var(--primary-color); text-align: center; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #444; }
        input { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary-color); }
        
        /* Botão Principal */
        #btnEnviar { width: 100%; background: var(--primary-color); color: white; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #btnEnviar:disabled { background: #ccc; }

        /* Estilo do Alerta Personalizado (Modal) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; }
        .modal-aviso { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 1000; width: 85%; max-width: 320px; text-align: center; animation: fadeIn 0.3s ease; }
        .modal-aviso h3 { color: var(--primary-color); margin-top: 0; margin-bottom: 10px; }
        .modal-aviso p { color: #555; font-size: 15px; line-height: 1.5; margin-bottom: 20px; }
        .modal-aviso button { background: var(--primary-color); color: white; border: none; padding: 12px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }

        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -60%); } to { opacity: 1; transform: translate(-50%, -50%); } }
        
        .footer { text-align: center; margin-top: 20px; font-size: 11px; color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <h2>Aroma de Lavanda 🧺</h2>
    <p style="text-align:center; color:#666; font-size:14px; margin-bottom:20px;">Indique um amigo e ganhe descontos!</p>
    <form id="formIndicacao">
        <div class="input-group">
            <label>Seu WhatsApp:</label>
            <input type="tel" id="seuWhatsapp" placeholder="Ex: 11999999999" required>
        </div>
        <div class="input-group">
            <label>Nome do Amigo:</label>
            <input type="text" id="nomeAmigo" placeholder="Nome do amigo" required>
        </div>
        <div class="input-group">
            <label>WhatsApp do Amigo:</label>
            <input type="tel" id="whatsAmigo" placeholder="Ex: 11988888888" required>
        </div>
        <button type="button" id="btnEnviar" onclick="enviar()">ENVIAR INDICAÇÃO ✨</button>
    </form>
    <div class="footer">© 2026 Aroma de Lavanda</div>
</div>

<div id="overlay" class="modal-overlay"></div>
<div id="meuModal" class="modal-aviso">
    <h3 id="tituloModal">Aroma de Lavanda 🧺</h3>
    <p id="msgModal"></p>
    <button onclick="fecharModal()">ENTENDIDO</button>
</div>

<script>
    // Função para mostrar o alerta bonito
    function mostrarAviso(titulo, texto) {
        document.getElementById('tituloModal').innerText = titulo;
        document.getElementById('msgModal').innerText = texto;
        document.getElementById('meuModal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    // Função para fechar o alerta
    function fecharModal() {
        document.getElementById('meuModal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }

    async function enviar() {
        const btn = document.getElementById('btnEnviar');
        const form = document.getElementById('formIndicacao');
        
        // LINK DO GOOGLE (Certifique-se que é o último link gerado)
        const url = "https://script.google.com/macros/s/AKfycbxVc8xR6A7VAz7_GqRMMByVVIjlszQaTSMCJtNIPCh1pUT6sb-PlgDFnk4N2hvuJn1x/exec";

        const nomeAmigo = document.getElementById('nomeAmigo').value;
        const whatsAmigoRaw = document.getElementById('whatsAmigo').value;
        const seuWhatsapp = document.getElementById('seuWhatsapp').value;

        if (!seuWhatsapp || !nomeAmigo || !whatsAmigoRaw) {
            mostrarAviso("Ops!", "Por favor, preencha todos os campos.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "VERIFICANDO...";

        try {
            // Enviamos para o Google e aguardamos a resposta
            // Nota: Para ler a resposta "EXISTE", o Google precisa estar configurado para aceitar
            const response = await fetch(url, {
                method: 'POST',
                body: JSON.stringify({
                    seuWhatsapp: seuWhatsapp,
                    nomeAmigo: nomeAmigo,
                    whatsAmigo: whatsAmigoRaw
                })
            });

            const resultado = await response.text();

            if (resultado.includes("EXISTE")) {
                mostrarAviso("Aroma de Lavanda 🧺", "Poxa, o " + nomeAmigo + " já faz parte da nossa família! 🌿 Que tal indicar outro amigo?");
                btn.disabled = false;
                btn.innerText = "ENVIAR INDICAÇÃO ✨";
            } else {
                btn.innerText = "SALVANDO...";
                setTimeout(() => {
                    const mensagem = "Oi! Estou usando a Lavanderia Aroma de Lavanda e lembrei de você! 🌿 É super prático e as roupas saem perfeitas.";
                    const numeroLimpo = whatsAmigoRaw.replace(/\D/g, '');
                    const linkWp = "https://api.whatsapp.com/send?phone=55" + numeroLimpo + "&text=" + encodeURIComponent(mensagem);
                    
                    form.reset();
                    btn.disabled = false;
                    btn.innerText = "ENVIAR INDICAÇÃO ✨";
                    window.location.href = linkWp;
                }, 800);
            }

        } catch (error) {
            // Em caso de erro de conexão, ainda deixamos o fluxo seguir para não perder a venda
            const numeroLimpo = whatsAmigoRaw.replace(/\D/g, '');
            window.location.href = "https://api.whatsapp.com/send?phone=55" + numeroLimpo + "&text=Oi! Conheça a Lavanderia Aroma de Lavanda!";
        }
    }
</script>
</body>
</html>
