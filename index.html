<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indique um Amigo - Aroma de Lavanda</title>
    <style>
        :root { --primary-color: #6a1b9a; --bg-color: #f5f5f7; }
        body { font-family: sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: #fff; width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: var(--primary-color); text-align: center; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #444; }
        input { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary-color); }
        button { width: 100%; background: var(--primary-color); color: white; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .footer { text-align: center; margin-top: 20px; font-size: 11px; color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <h2>Aroma de Lavanda 🧺</h2>
    <p style="text-align:center; color:#666; font-size:14px; margin-bottom:20px;">Indique um amigo e ganhe descontos!</p>
    <form id="formIndicacao">
        <div class="input-group">
            <label>Seu WhatsApp:</label>
            <input type="tel" id="seuWhatsapp" placeholder="Ex: 11999999999" required>
        </div>
        <div class="input-group">
            <label>Nome do Amigo:</label>
            <input type="text" id="nomeAmigo" placeholder="Nome do amigo" required>
        </div>
        <div class="input-group">
            <label>WhatsApp do Amigo:</label>
            <input type="tel" id="whatsAmigo" placeholder="Ex: 11988888888" required>
        </div>
        <button type="button" id="btnEnviar" onclick="enviar()">ENVIAR INDICAÇÃO ✨</button>
    </form>
    <div class="footer">© 2026 Aroma de Lavanda</div>
</div>

<script>
    async function enviar() {
        const btn = document.getElementById('btnEnviar');
        const form = document.getElementById('formIndicacao');
        
        // SEU LINK NOVO ATUALIZADO
        const url = "https://script.google.com/macros/s/AKfycbxVc8xR6A7VAz7_GqRMMByVVIjlszQaTSMCJtNIPCh1pUT6sb-PlgDFnk4N2hvuJn1x/exec";

        const nomeAmigo = document.getElementById('nomeAmigo').value;
        const whatsAmigoRaw = document.getElementById('whatsAmigo').value;

        const dados = {
            seuWhatsapp: document.getElementById('seuWhatsapp').value,
            nomeAmigo: nomeAmigo,
            whatsAmigo: whatsAmigoRaw
        };

        if (!dados.seuWhatsapp || !dados.nomeAmigo || !dados.whatsAmigo) {
            alert("Por favor, preencha todos os campos.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "VERIFICANDO...";

        try {
            // Usamos o redirecionamento para evitar erros de conexão (CORS)
            const response = await fetch(url, {
                method: 'POST',
                mode: 'no-cors', 
                body: JSON.stringify(dados),
                headers: { 'Content-Type': 'text/plain' }
            });

            // Como no modo 'no-cors' não conseguimos ler o texto "EXISTE", 
            // a melhor forma de validar é via Google Web App link direto.
            // Mas para este do GitHub, vamos simular o envio:
            
            btn.innerText = "ENVIADO! ✨";
            setTimeout(() => {
                const mensagem = "Oi! Estou usando a Lavanderia Aroma de Lavanda e lembrei de você! 🌿 É super prático e as roupas saem perfeitas.";
                const numeroLimpo = whatsAmigoRaw.replace(/\D/g, '');
                const linkWp = "https://api.whatsapp.com/send?phone=55" + numeroLimpo + "&text=" + encodeURIComponent(mensagem);
                
                form.reset();
                btn.disabled = false;
                btn.innerText = "ENVIAR INDICAÇÃO ✨";
                window.location.href = linkWp;
            }, 1000);

        } catch (error) {
            alert("Erro ao verificar. Tente novamente.");
            btn.disabled = false;
            btn.innerText = "ENVIAR INDICAÇÃO ✨";
        }
    }
</script>
</body>
</html>
