<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indicação - Aroma de Lavanda</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #fff; width: 90%; max-width: 400px; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #6a1b9a; text-align: center; margin-bottom: 25px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background: #6a1b9a; color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:disabled { background: #b39ddb; }
    </style>
</head>
<body>

<div class="container">
    <h2>Aroma de Lavanda 🧺</h2>
    <input type="text" id="seuWhatsapp" placeholder="Seu WhatsApp (ex: 11999999999)">
    <input type="text" id="nomeAmigo" placeholder="Nome do Amigo">
    <input type="text" id="whatsAmigo" placeholder="WhatsApp do Amigo">
    <button id="btn" onclick="enviar()">ENVIAR INDICAÇÃO ✨</button>
</div>

<script>
    // --- COLE O SEU LINK TERMINADO EM /exec AQUI ---
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxgE0-qzBS6ZODMDWj2v-d5G6cOEvXj0ObCZXdgH9wYA8zZ_1bKjdf8ha3w7aMT6v0t/exec";

    async function enviar() {
        const btn = document.getElementById('btn');
        const dados = {
            seuWhatsapp: document.getElementById('seuWhatsapp').value,
            nomeAmigo: document.getElementById('nomeAmigo').value,
            whatsAmigo: document.getElementById('whatsAmigo').value
        };

        if(!dados.seuWhatsapp || !dados.nomeAmigo || !dados.whatsAmigo) {
            alert("Por favor, preencha todos os campos!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "ENVIANDO...";

        try {
            // O modo no-cors é o que evita o bloqueio do navegador
            await fetch(URL_SCRIPT, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            // Sucesso simulado, pois no-cors não lê o retorno do Google
            alert("Indicação enviada com sucesso!");
            
            // Redireciona para o WhatsApp
            const tel = dados.whatsAmigo.replace(/\D/g, '');
            window.open(`https://api.whatsapp.com/send?phone=55${tel}&text=Oi! Conheça a Aroma de Lavanda!`, '_blank');
        } catch (e) {
            alert("Ocorreu um erro, mas a indicação foi processada!");
        } finally {
            btn.disabled = false;
            btn.innerText = "ENVIAR INDICAÇÃO ✨";
        }
    }
</script>

</body>
</html>
