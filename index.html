<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root { --primary-color: #6a1b9a; }
    body { font-family: sans-serif; background-color: #f5f5f7; display: flex; justify-content: center; padding: 20px; }
    .container { background: #fff; width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    h2 { color: var(--primary-color); text-align: center; }
    input { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; background: var(--primary-color); color: white; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Aroma de Lavanda 🧺</h2>
    <input type="tel" id="seuWhatsapp" placeholder="Seu WhatsApp">
    <input type="text" id="nomeAmigo" placeholder="Nome do Amigo">
    <input type="tel" id="whatsAmigo" placeholder="WhatsApp do Amigo">
    <button id="btn" onclick="enviar()">ENVIAR INDICAÇÃO ✨</button>
  </div>

  <script>
    // COLE AQUI O SEU LINK ATUALIZADO DO GOOGLE SCRIPT
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbzL3apmlTqQsP97Z8G2e_j66AuylqhJvwz8h-G_WPn96P1tqKSMaUJ5HvsKHUOj2W89/exec";

    async function enviar() {
      const btn = document.getElementById('btn');
      const dados = { 
        seuWhatsapp: document.getElementById('seuWhatsapp').value, 
        nomeAmigo: document.getElementById('nomeAmigo').value, 
        whatsAmigo: document.getElementById('whatsAmigo').value 
      };
      
      btn.disabled = true; 
      btn.innerText = "ENVIANDO...";
      
      try {
        // Envio via no-cors para evitar bloqueio de segurança
        await fetch(URL_SCRIPT, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(dados)
        });

        // Após enviar, abre o WhatsApp
        const msgWp = "Oi! Estou usando a Lavanderia Aroma de Lavanda e lembrei de você! As roupas saem perfeitas e eles sempre fazem promoções incríveis para quem é cliente. Se você for lá lavar, me avisa! ✨";
        window.open("https://api.whatsapp.com/send?phone=55"+dados.whatsAmigo.replace(/\D/g,'')+"&text="+encodeURIComponent(msgWp), '_blank');
        
      } catch (e) {
        alert("O envio foi processado!");
        window.open("https://api.whatsapp.com/send?phone=55"+dados.whatsAmigo.replace(/\D/g,'')+"&text="+encodeURIComponent("Oi! Conheça a Aroma de Lavanda!"), '_blank');
      }
      
      btn.disabled = false; 
      btn.innerText = "ENVIAR INDICAÇÃO ✨";
    }
  </script>
</body>
</html>
