<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; background-color: #f5f5f7; display: flex; justify-content: center; padding: 20px; }
    .container { background: #fff; width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    input { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; background: #6a1b9a; color: white; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Aroma de Lavanda 🧺</h2>
    <input type="tel" id="seuWhatsapp" placeholder="Seu WhatsApp">
    <input type="text" id="nomeAmigo" placeholder="Nome do Amigo">
    <input type="tel" id="whatsAmigo" placeholder="WhatsApp do Amigo">
    <button id="btn" onclick="enviar()">ENVIAR INDICAÇÃO ✨</button>
  </div>

  <script>
    // COPIE O SEU LINK DE IMPLANTAÇÃO MAIS RECENTE AQUI
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwb3D4tin2ZQDT2Qtkz8Ei9ioDfgSkOYjZMCdkPbHFXFv2TxCsBBECfXJsRz0Em3Xw/exec";

    async function enviar() {
      const btn = document.getElementById('btn');
      const dados = { 
        seuWhatsapp: document.getElementById('seuWhatsapp').value, 
        nomeAmigo: document.getElementById('nomeAmigo').value, 
        whatsAmigo: document.getElementById('whatsAmigo').value 
      };
      
      btn.disabled = true;
      btn.innerText = "ENVIANDO...";
      
      try {
        const response = await fetch(URL_SCRIPT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(dados)
        });

        const res = await response.text();
        
        if (res === "OK") {
          const msgWp = "Oi! Conheça a Aroma de Lavanda!";
          window.open("https://api.whatsapp.com/send?phone=55"+dados.whatsAmigo.replace(/\D/g,'')+"&text="+encodeURIComponent(msgWp), '_blank');
        } else {
          alert("Erro no servidor: " + res);
        }
      } catch (e) {
        alert("Erro de conexão. Tente novamente.");
      }
      
      btn.disabled = false;
      btn.innerText = "ENVIAR INDICAÇÃO ✨";
    }
  </script>
</body>
</html>
